name: CI-Python-App

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
      
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: run tests
        run: |
          pytest tests
      
      - name: run lint
        run: |
          flake8 src tests
      
      - name: run type check
        run: |
          mypy src tests

name: CI-Code-Scan

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SEMGREP_RULES:
        required: true
    inputs:
      sonar_project_key:
        required: true
        type: string
      sonar_sources:
        required: true
        type: string
      semgrep_sources:
        required: true
        type: string

env:
  checkout_hash: ${{ vars.ACTIONS_CHECKOUT_HASH }}
  sonarscanner_hash: ${{ vars.ACTIONS_SONARSCANNER_HASH }}

jobs:
  sonarqube-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@${{ env.checkout_hash }}

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
          restore-keys: sonar-

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@${{ env.sonarscanner_hash }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.sources=${{ inputs.sonar_sources }}

      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  semgrep-scan:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repo
        uses: actions/checkout@${{ env.checkout_hash }}

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=${{ secrets.SEMGREP_RULES }} \
            --error \
            --json \
            --output=semgrep.json \
            ${{ inputs.semgrep_sources }}

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.json

name: CD-Deploy-Production

on:
  workflow_call:
    secrets:
      SSH_HOST:
        required: true
      SSH_USERNAME:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      SSH_PORT:
        required: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  sshaction_hash: ${{ vars.ACTIONS_SSHACTION_HASH }}

jobs:
  deploy-fe:
    runs-on: ubuntu-latest
    steps:
      - name: ssh deploy
        uses: appleboy/ssh-action@$sshaction_hash
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: deploy/deploy.sh

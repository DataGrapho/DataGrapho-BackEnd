name: CI - Build Backend Docker Image

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    inputs:
      image-name:
        required: false
        type: string
        default: "datagrapho-be"
        description: "Nome da imagem no Docker Hub"
      dockerfile-path:
        required: false
        type: string
        default: "./Dockerfile"
        description: "Caminho do Dockerfile"
      context:
        required: false
        type: string
        default: "."
        description: "Contexto de build"

env:
  checkout_hash: ${{ vars.ACTIONS_CHECKOUT_HASH }}
  hadolint_hash: ${{ vars.ACTIONS_HADOLINT_HASH }}
  dockerlogin_hash: ${{ vars.ACTIONS_DOCKERLOGIN_HASH }}
  dockerbuildpush_hash: ${{ vars.ACTIONS_DOCKERBUILDPUSH_HASH }}
  trivyscan_hash: ${{ vars.ACTIONS_TRIVYSCAN_HASH }}

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@${{ env.checkout_hash }}

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@${{ env.hadolint_hash }}
        with:
          dockerfile: ${{ inputs.dockerfile-path }}
          ignore: DL3008,DL3009

  docker-build-publish:
    runs-on: ubuntu-latest
    needs: docker-lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@${{ env.checkout_hash }}

      - name: Docker login
        uses: docker/login-action@${{ env.dockerlogin_hash }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build and push
        uses: docker/build-push-action@${{ env.dockerbuildpush_hash }}
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:buildcache,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@${{ env.trivyscan_hash }}
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
version: "3.8"

services:
  sonarqube:
    image: sonarqube:9.9-community
    container_name: ${SONARQUBE_CONTAINER_NAME}
    restart: always
    env_file:
      - .env
    depends_on:
      - db-sonarqube
    ports:
      - "${SONARQUBE_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://${SONARQUBE_DB_HOST}:${SONARQUBE_DB_PORT}/${SONARQUBE_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  db-sonarqube:
    image: postgres:13.12
    container_name: ${SONARQUBE_DB_CONTAINER_NAME}
    restart: always
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: ${SONARQUBE_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgres_data: